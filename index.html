   <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Centro</title>
    <!-- Bootstrap 5 CDN -->
    
    <style>
        /* Estilos para centralizar na tela toda */
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5; /* Cor de fundo leve */
        }
        .form-signin {
            width: 100%;
            max-width: 330px;
            padding: 15px;
            margin: auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<form class="form-signin">
    <h2 class="h3 mb-3 fw-normal text-center">Login</h2>


    <div class="form-floating mb-3">
        <input type="text" class="form-control" id="txtNome" placeholder="Digite seu nome" required>
        <label for="txtNome">Nome</label>
    </div>

    
    <div class="form-floating mb-3">
        <input type="password" class="form-control" id="password" placeholder="Senha" required>
        <label for="password">Senha</label>
    </div>

    
    <div class="d-grid gap-2">
        <button id="submit-login" class="btn btn-primary" type="submit">Entrar</button>
        <button id="cancel-login"class="btn btn-outline-secondary" type="button">Cancelar</button>
    </div>
</form>

</body>
</html>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
