<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Mesas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="/css/fluxo-mesas.css" rel="stylesheet" />
</head>

<body>

  <!-- NAVEGAÇÃO -->
  <nav class="nav-topo">
    <div class="d-flex">
      <a href="#" class="nav-link ativo" onclick="setAtivo(this); return false;">Mesas</a>
      <a href="#" class="nav-link" onclick="setAtivo(this); return false;">Pedidos</a>
      <a href="#" class="nav-link" onclick="setAtivo(this); return false;">Cardápio</a>
      <a href="#" class="nav-link" onclick="setAtivo(this); return false;">Comandas</a>
    </div>
  </nav>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="container-fluid px-4 py-4">
    <div class="row g-4">

      <!-- COLUNA PRINCIPAL -->
      <div class="col-lg-8">

        <!-- Barra de legenda + botão -->
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
          <div class="d-flex align-items-center gap-3">
            <span><span class="dot dot-livre me-1"></span> Livre</span>
            <span><span class="dot dot-reservado me-1"></span> Reservado</span>
            <span><span class="dot dot-ocupado me-1"></span> Ocupado</span>
          </div>
          <button class="btn-nova-mesa" onclick="novaMesa()">+ Nova Mesa</button>
        </div>

        <!-- Grid de mesas -->
        <div class="area-mesas">
          <div class="row g-3" id="gridMesas">

            <!-- Mesas geradas via JS -->
             
          </div>
        </div>
      </div>

      <!-- COLUNA LATERAL -->
      <div class="col-lg-4">
        <div class="painel-lateral">
          <h5 id="nomeMesaSelecionada" class="mb-4">MESA —</h5>

          <div class="mb-3">
            <label for="qtdLugares">Quantidade de Lugares</label>
            <input type="number" class="form-control" id="qtdLugares" placeholder="Ex: 5" min="1" />
          </div>

          <div class="mb-4">
            <label for="statusMesa">Status</label>
            <select class="form-control" id="statusMesa">
              <option value="">Selecione...</option>
              <option value="livre">Livre</option>
              <option value="reservado">Reservado</option>
              <option value="ocupado">Ocupado</option>
            </select>
          </div>

          <button class="btn-adicionar mb-4" onclick="adicionarPedido()">Adicionar Pedido</button>

          <div class="valor-comanda">
            Valor total da Comanda:<br />
            <span id="valorComanda">R$ 00,00</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/fluxo-mesas.js"></script>
</body>

</html>
